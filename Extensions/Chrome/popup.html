<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity Analyst</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 280px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
        font-size: 13px;
        color: #1d1d1f;
        background: #ffffff;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .header-icon {
        width: 24px;
        height: 24px;
        background: #335670;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 12px;
        font-weight: 600;
      }
      .header-title {
        font-size: 14px;
        font-weight: 600;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: #f5f5f7;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .status-dot.connected {
        background: #34c759;
      }
      .status-dot.disconnected {
        background: #ff3b30;
      }
      .status-text {
        font-size: 12px;
        color: #86868b;
      }
      .info {
        font-size: 11px;
        color: #86868b;
        line-height: 1.5;
      }
      .current-site {
        padding: 10px 12px;
        background: #f5f5f7;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      .current-site-label {
        font-size: 10px;
        color: #86868b;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .current-site-domain {
        font-size: 13px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-icon">AA</div>
      <div class="header-title">Activity Analyst</div>
    </div>

    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Checking...</span>
    </div>

    <div class="current-site" id="currentSite" style="display: none">
      <div class="current-site-label">Currently tracking</div>
      <div class="current-site-domain" id="currentDomain">—</div>
    </div>

    <p class="info">
      This extension sends your active tab information to the Activity Analyst
      app for accurate website tracking. No browsing data leaves your computer.
    </p>

    <script src="popup.js"></script>
  </body>
</html>
