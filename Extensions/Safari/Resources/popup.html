<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity Analyst</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 260px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          sans-serif;
        font-size: 13px;
        color: #1d1d1f;
        background: #ffffff;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .header-icon {
        width: 24px;
        height: 24px;
        background: #335670;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 11px;
        font-weight: 600;
      }
      .header-title {
        font-size: 14px;
        font-weight: 600;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: #f5f5f7;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #34c759;
      }
      .status-text {
        font-size: 12px;
        color: #86868b;
      }
      .info {
        font-size: 11px;
        color: #86868b;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-icon">AA</div>
      <div class="header-title">Activity Analyst</div>
    </div>

    <div class="status">
      <div class="status-dot"></div>
      <span class="status-text">Connected via native messaging</span>
    </div>

    <p class="info">
      This extension sends your active tab information to Activity Analyst for
      accurate website tracking. All data stays on your Mac.
    </p>
  </body>
</html>
