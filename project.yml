name: ActivityAnalyst
options:
  bundleIdPrefix: com.activityanalyst
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_PREVIEWS: "YES"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "6.24.0"
  AnthropicSDK:
    url: https://github.com/anthropics/anthropic-sdk-swift.git
    from: "0.1.0"

targets:
  ActivityAnalyst:
    type: application
    platform: macOS
    sources:
      - ActivityAnalyst
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.activityanalyst.app
        INFOPLIST_FILE: ActivityAnalyst/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ActivityAnalyst/Resources/ActivityAnalyst.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: "YES"
    dependencies:
      - package: GRDB
      - package: AnthropicSDK
    entitlements:
      path: ActivityAnalyst/Resources/ActivityAnalyst.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true

  ActivityAnalystTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/ActivityAnalystTests
    dependencies:
      - target: ActivityAnalyst
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.activityanalyst.tests
