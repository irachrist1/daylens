# Chat bench cases — run against a live-DB copy through the REAL sendMessage
# (same code path as the UI, real provider calls; ADR 0003 / ai.md §4.3).
#
# Ground truth for the moment cases: website_visits overlapping the asked
# clock time, verified with sqlite before pinning mustContain.
#
# turns run sequentially in ONE thread, so follow-up cases prove context
# carrying. dataDependent cases assert only the hard guards (no begging, no
# hedging, artifacts real) and print the answer for human judgment.

cases:
  # ── Moment questions (the exact video at that minute, never a dump) ──────
  - id: tuesday_3pm_youtube
    turns:
      - >-
        What was I watching on Tuesday, July 7 at 3:00pm? Name the exact video
        title — not just YouTube or the browser.
    mustContain:
      - Chinese Performance Cars
    mustNotContain:
      - Grades for Gentil
      - page titles didn't come through

  # ── Follow-up keeps the hour and actually breaks it down ─────────────────
  - id: tuesday_3pm_increments
    turns:
      - What was I watching on Tuesday, July 7 at 3:00pm? Name the exact video.
      - Break that hour into 10-minute increments.
    minDistinctTimes: 4
    mustNotContain:
      - page titles didn't come through

  - id: monday_30_minute_breakdown
    dataDependent: true
    turns:
      - Break my Monday into 30-minute chunks.
    incrementMinutes: 30
    mustContain:
      - July 6
      - locked
    mustNotContain:
      - get_moment
      - get_day_overview

  - id: sunday_1445_run_faster
    turns:
      - What was I watching on Sunday, July 12 at 2:45pm? Exact video title.
    mustContain:
      - Smartest Way To Run Faster
    mustNotContain:
      - DREAM New York City apartment

  - id: saturday_1000_build_this
    turns:
      - What was I watching on Saturday, July 11 at 10:00am? Name the video.
    mustContain:
      - If I was 25 with $0
    mustNotContain:
      - nothing was foregrounded

  - id: thursday_1300_meet
    turns:
      - What was I looking at on Thursday, July 9 at 1:00pm? Name the exact page.
    mustContain:
      - Machine Learning Pipeline

  - id: friday_1650_hackathon
    turns:
      - What page was I on Friday, July 10 at 4:50pm? Exact title.
    mustContain:
      - Frontiers PAIO Hackathon

  # ── Fuzzy link recall ─────────────────────────────────────────────────────
  - id: recall_uganda_link
    turns:
      - >-
        That geography video about Uganda I watched on July 11 — find me the
        link.
    mustContain:
      - Uganda
      - "?v="

  # ── Excel export (a real file, not a wall of rows) ───────────────────────
  - id: youtube_month_excel
    turns:
      - >-
        Give me an Excel of all YouTube videos I watched this month: video
        title, total time on it, and how many visits.
    expectArtifactFormat: xlsx

  # ── Podcasts (judgment on top of evidence, honest about limits) ──────────
  - id: podcasts_month
    dataDependent: true
    turns:
      - What podcasts did I listen to this month?
    userAnswer: Include YouTube video podcasts too

  # ── Shipped work (Daylens activity + git) ────────────────────────────────
  - id: shipped_this_month
    dataDependent: true
    turns:
      - What did I ship this month? Check my actual commits where you can.

  # ── Aside stays warm, no tools, no capability menu ───────────────────────
  - id: greeting
    turns:
      - hey, how's it going?
    mustNotContain:
      - get_day_overview
      - "I can help you with"
