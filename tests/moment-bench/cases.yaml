# Moment / watching answer-quality cases against the live Daylens DB.
# Free: deterministic router only — no provider calls, no chat UI.
#
# Ground truth: website_visits overlapping the asked clock time
# (verified with sqlite before pinning mustContain).
#
# UI linkage: chat sendMessage calls the same shouldUseRouter +
# routeInsightsQuestion path (aiService.ts). A PASS here is the same
# string the UI streams when the router hits.

cases:
  - id: tuesday_3pm_youtube
    question: >-
      What was I watching on Tuesday, July 7 at 3:00pm? Name the exact video
      title — not just YouTube or the browser.
    referenceNow: "2026-07-12T15:30:00"
    expectTitle: "Tuesday Watching"
    mustContain:
      - Chinese Performance Cars
      - watching
    mustNotContain:
      - Grades for Gentil
      - "Pages:"
      - page titles didn't come through
      - Top apps in that block

  - id: sunday_1510_nyc_apartment
