<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131315"/>
      <stop offset="100%" stop-color="#0f0f10"/>
    </linearGradient>
    <linearGradient id="facet-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#e08d0d"/>
    </linearGradient>
    <linearGradient id="facet-right" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcc860"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="facet-top" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffe0a0"/>
      <stop offset="100%" stop-color="#fcc860"/>
    </linearGradient>
    <linearGradient id="arc1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arc2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <!-- Subtle outer glow -->
  <circle cx="512" cy="480" r="260" fill="#f5a623" opacity="0.04" filter="url(#blur)"/>
  <!-- Geometric crystal/prism — three faceted faces -->
  <!-- Left facet -->
  <path d="M512 280 L340 520 L512 680 Z" fill="url(#facet-left)" opacity="0.9"/>
  <!-- Right facet -->
  <path d="M512 280 L684 520 L512 680 Z" fill="url(#facet-right)" opacity="0.85"/>
  <!-- Top highlight facet -->
  <path d="M512 280 L340 520 L512 460 L684 520 Z" fill="url(#facet-top)" opacity="0.35"/>
  <!-- Soft arcs suggesting time segments -->
  <path d="M310 620 Q512 740 714 620" fill="none" stroke="url(#arc1)" stroke-width="3" stroke-linecap="round"/>
  <path d="M350 660 Q512 760 674 660" fill="none" stroke="url(#arc2)" stroke-width="2" stroke-linecap="round"/>
  <!-- Center light point -->
  <circle cx="512" cy="460" r="6" fill="#ffe0a0" opacity="0.8"/>
</svg>
