model_list:
  - model_name: daylens-default
    litellm_params:
      model: os.environ/DAYLENS_MANAGED_MODEL
      api_key: os.environ/DAYLENS_PROVIDER_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  disable_spend_logs: false

litellm_settings:
  set_verbose: false
  json_logs: true
  turn_off_message_logging: true
  redact_user_api_key_info: true
  request_timeout: 90
