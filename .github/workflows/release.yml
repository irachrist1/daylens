name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-26

    steps:
      - name: Derive release metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Align local branch with tagged commit
        run: |
          git fetch origin main --depth=1
          git branch --contains "$GITHUB_SHA" origin/main
          git checkout -B main "$GITHUB_SHA"

      - name: Install release dependencies
        run: |
          brew install xcodegen create-dmg

      - name: Build release artifacts
        run: |
          chmod +x scripts/build-release.sh
          scripts/build-release.sh "${{ steps.meta.outputs.version }}"

      - name: Extract release notes
        run: |
          awk '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            /^## \[/ && capture { exit }
            capture { print }
          ' version="${{ steps.meta.outputs.version }}" CHANGELOG.md > RELEASE_NOTES.md

          if [[ ! -s RELEASE_NOTES.md ]]; then
            echo "Failed to extract release notes for version ${{ steps.meta.outputs.version }}" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Daylens ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/Daylens-${{ steps.meta.outputs.version }}.dmg
            dist/Daylens-${{ steps.meta.outputs.version }}.dmg.sha256
