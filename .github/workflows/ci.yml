name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Native modules are not needed for a type-only check, so skip the
      # postinstall electron-rebuild step to keep CI fast and reliable.
      - run: npm ci --ignore-scripts
      - run: npm run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # knip requires node >=20.19; 22 LTS satisfies eslint, knip, and tseslint.
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      # Dead-code report starts advisory; tighten to a hard gate once triaged.
      - name: knip (report-only)
        run: npm run knip
        continue-on-error: true

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # The suite runs under Electron-as-node and uses real better-sqlite3, so
      # the Electron binary's shared libraries and the native modules must be
      # present. Mirror the proven setup in verify-linux-runtime.yml.
      - name: Install Electron runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libnotify-dev libx11-dev libxss-dev libxtst-dev xvfb xauth dbus-x11
      - run: npm ci --ignore-scripts
      - name: Install Electron binary
        run: node node_modules/electron/install.js
      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar
      # ELECTRON_RUN_AS_NODE means no display is needed, but wrap in xvfb-run so
      # the Electron binary never trips on a missing X server during startup.
      - name: Run hermetic test suite
        run: xvfb-run -a npm test

  windows:
    name: windows-native-rebuild
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar
      - run: npm run typecheck
      - run: npm test
