name: CI

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
  push:
    branches: [main]

# Cancel superseded runs on PRs and feature branches; never cancel main pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Native modules are not needed for a type-only check, so skip the
      # postinstall electron-rebuild step to keep CI fast and reliable.
      - run: npm ci --ignore-scripts
      - run: npm run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # knip requires node >=20.19; 22 LTS satisfies eslint, knip, and tseslint.
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      # Dead-code report starts advisory; tighten to a hard gate once triaged.
      - name: knip (report-only)
        run: npm run knip
        continue-on-error: true

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # The suite runs under Electron-as-node and uses real better-sqlite3, so
      # the Electron binary's shared libraries and the native modules must be
      # present. Mirror the proven setup in verify-linux-runtime.yml.
      - name: Install Electron runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libnotify-dev libx11-dev libxss-dev libxtst-dev xvfb xauth dbus-x11
      - run: npm ci --ignore-scripts
      - name: Cache Electron binary download
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Electron binary
        run: node node_modules/electron/install.js
      - name: Cache native module builds
        id: native-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.electron-gyp
            node_modules/better-sqlite3/build/Release
            node_modules/keytar/build/Release
            node_modules/@paymoapp/active-window/build/Release
          key: native-build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Rebuild native modules for Electron
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar
      # ELECTRON_RUN_AS_NODE means no display is needed, but wrap in xvfb-run so
      # the Electron binary never trips on a missing X server during startup.
      - name: Run hermetic test suite
        run: xvfb-run -a npm test
      - name: Verify synthetic product day
        run: xvfb-run -a npm run verify:synthetic-day
      - name: Verify deterministic AI turn
        run: xvfb-run -a npm run verify:ai-turn
      - name: Verify remote and web behavior
        run: xvfb-run -a npm run verify:remote-web
      - name: Run strict Timeline evaluation
        run: xvfb-run -a npm run timeline:eval -- --strict

  contracts-web-billing:
    name: contracts-web-billing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      # Root contract:check also covers sibling-repo drift; the apps/web-side
      # contract:check, manifest:check, typecheck, and build are owned by the
      # Remote Parity workflow (remote-parity.yml) and are not repeated here.
      - run: npm run contract:check
      - run: npm run billing:check
      - run: npm run billing:sandbox

  windows:
    name: windows-native-rebuild
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Cache Electron binary download
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Electron binary
        run: node node_modules/electron/install.js
      - name: Cache native module builds
        id: native-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.electron-gyp
            node_modules/better-sqlite3/build/Release
            node_modules/keytar/build/Release
            node_modules/@paymoapp/active-window/build/Release
          key: native-build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      # Typecheck is platform-independent and owned by the typecheck job above.
      # Hermetic suite runs on ubuntu-latest/test; this job only proves Windows
      # native modules compile under electron-rebuild (skipped when the exact
      # lockfile already compiled successfully and is cached).
      - name: Rebuild native modules for Electron
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar
