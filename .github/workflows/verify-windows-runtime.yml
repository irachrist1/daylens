name: Verify Windows Runtime

# Windows minutes bill at 2x, so this full packaging + smoke run stays off
# PRs entirely. The Linux verify (1x billing) still runs on PRs and catches
# most packaging breakage; Windows coverage comes from merges to main, the
# nightly schedule below, and manual dispatch.
on:
  push:
    branches:
      - main
  schedule:
    # Nightly safety net at a quiet hour (03:47 UTC), staggered 30 min
    # apart from the macOS verify to avoid a self-inflicted burst.
    - cron: '47 3 * * *'
  workflow_dispatch:

# Queue-latest per ref: cancel superseded runs everywhere, including main.
# A superseded main build is safe to cancel — the newest commit's run covers
# it — and without this, batch-merging several PRs fires one expensive build
# per merge commit simultaneously.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-windows-runtime:
    timeout-minutes: 90
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Cache Electron binary download
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Cache native module builds
        id: native-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.electron-gyp
            node_modules/better-sqlite3/build/Release
            node_modules/keytar/build/Release
            node_modules/@paymoapp/active-window/build/Release
          key: native-build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Rebuild native modules for Electron
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar

      # Typecheck is platform-independent and runs once in ci.yml.

      - name: Build Vite bundles and Windows capture helper
        run: npm run build:all

      - name: Package Windows installer
        run: npx electron-builder --win nsis --x64 --config electron-builder.config.js --publish never

      - name: Verify packaged native modules
        run: node scripts/verify-packaged-natives.js

      - name: Smoke-test packaged runtime
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $setup = "dist-release/Daylens-$version-Setup.exe"
          if (-not (Test-Path $setup)) { throw "Missing installer: $setup" }
          $installDir = Join-Path $env:RUNNER_TEMP "daylens-smoke"
          if (Test-Path $installDir) { Remove-Item -Recurse -Force $installDir }
          New-Item -ItemType Directory -Path $installDir | Out-Null
          Start-Process -FilePath $setup -ArgumentList '/S', "/D=$installDir" -Wait
          # NSIS silent installers respawn a second process, so -Wait can return
          # before extraction finishes. Poll for the installed exe instead of
          # trusting the installer's exit.
          $appExe = $null
          $deadline = (Get-Date).AddSeconds(90)
          while (-not $appExe) {
            $appExe = Get-ChildItem -Path $installDir -Filter Daylens.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($appExe -or (Get-Date) -ge $deadline) { break }
            Start-Sleep -Seconds 3
          }
          if (-not $appExe) { throw 'Daylens.exe not found within 90s of installer exit' }
          $env:DAYLENS_SMOKE_TEST = '1'
          $env:DAYLENS_SMOKE_REPORT_PATH = Join-Path $env:RUNNER_TEMP 'daylens-windows-smoke.json'
          $env:DAYLENS_SMOKE_WINDOW_STATE_PATH = Join-Path $env:RUNNER_TEMP 'daylens-windows-window-state.json'
          $env:DAYLENS_SMOKE_EXPECT_FOREGROUND_TITLE = 'Runtime Capture Foreground'
          $env:DAYLENS_SMOKE_EXPECT_FULLSCREEN_TITLE = 'Runtime Capture Fullscreen'
          $env:DAYLENS_DEV_USERDATA = Join-Path $env:RUNNER_TEMP 'daylens-windows-userdata'
          scripts/run-windows-capture-smoke.ps1 -AppPath $appExe.FullName
          node scripts/verify-windows-smoke.js `
            --report $env:DAYLENS_SMOKE_REPORT_PATH `
            --window-state $env:DAYLENS_SMOKE_WINDOW_STATE_PATH

      - name: Upload Windows runtime diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: windows-runtime-diagnostics
          if-no-files-found: warn
          compression-level: 0
          retention-days: 14
          path: |
            dist-release/**
            ${{ runner.temp }}/daylens-windows-smoke.json
            ${{ runner.temp }}/daylens-windows-window-state.json
            builder-debug.yml
            electron-builder-debug.yml
            npm-debug.log*
