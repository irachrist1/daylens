name: Promote Linear Frontier

on:
  schedule:
    # Daily at a quiet hour. This ran every 10 minutes and failed every run
    # (missing LINEAR_API_KEY), burning ~144 billed runs a day for nothing.
    - cron: '23 5 * * *'
  workflow_dispatch:
    inputs:
      issue:
        description: Optional DEV issue identifier to evaluate by itself
        required: false
        type: string
      dry_run:
        description: Report eligible issues without changing Linear
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: promote-linear-frontier
  cancel-in-progress: false

jobs:
  promote:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check Linear credential
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          if [ -z "$LINEAR_API_KEY" ]; then
            echo "::error::Repository secret LINEAR_API_KEY is not set. Add it under Settings > Secrets and variables > Actions, or disable this workflow. Every step below requires it."
            exit 1
          fi
      - name: Promote newly unblocked issues
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_PROJECT_ID: f0ed91fc-83f1-4dc4-9294-4817efd9971a
          LINEAR_TEAM_ID: 6ab512ef-6b06-48a3-bff9-2e4a951fdcef
          SELECTED_ISSUE: ${{ inputs.issue }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          args=()
          if [ -n "$SELECTED_ISSUE" ]; then args+=(--issue "$SELECTED_ISSUE"); fi
          if [ "$DRY_RUN" = "true" ]; then args+=(--dry-run); fi
          node scripts/promote-linear-frontier.mjs "${args[@]}"
