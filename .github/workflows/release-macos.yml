name: Release macOS

on:
  push:
    tags:
      - "v*-mac"
  workflow_dispatch:
    inputs:
      version:
        description: macOS version number to release
        required: true
      tag_name:
        description: Git tag to publish against
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    timeout-minutes: 90
    # GitHub-hosted Apple Silicon runner. Switch back to a Blacksmith label
    # (e.g. blacksmith-6vcpu-macos-latest) once the Blacksmith app/credits are restored.
    runs-on: macos-latest

    steps:
      - name: Derive version from tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG_NAME="${{ inputs.tag_name }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            VERSION="${VERSION%-mac}"
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          RELEASE_TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      # Fail fast — before dependencies, typecheck, and packaging — when the
      # signing secrets are partially configured, and print exactly which
      # secrets are missing so fixing the release is a checklist, not a debug
      # session. Signed + notarized releases need:
      #   MAC_CERTIFICATE_FILE      base64 of the Developer ID Application .p12
      #   MAC_CERTIFICATE_PASSWORD  password for that .p12
      # plus ONE of the two notarization credential sets:
      #   APPLE_API_KEY + APPLE_API_KEY_ID + APPLE_API_ISSUER   (App Store Connect API key — preferred)
      #   APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID (Apple ID fallback)
      # With no signing secrets at all the build falls back to ad-hoc signing
      # unless the repository variable DAYLENS_REQUIRE_MAC_SIGNING is '1'.
      # See docs/operations/macos-signing.md for the one-time setup steps.
      - name: Detect signing mode and validate credentials
        id: signing
        shell: bash
        env:
          HAS_MAC_CERTIFICATE_FILE: ${{ secrets.MAC_CERTIFICATE_FILE != '' }}
          HAS_MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD != '' }}
          HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY != '' }}
          HAS_APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID != '' }}
          HAS_APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER != '' }}
          HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}
          HAS_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
          HAS_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' }}
          REQUIRE_MAC_SIGNING: ${{ vars.DAYLENS_REQUIRE_MAC_SIGNING }}
        run: |
          set -euo pipefail

          cert_ok=true
          [ "$HAS_MAC_CERTIFICATE_FILE" = "true" ] && [ "$HAS_MAC_CERTIFICATE_PASSWORD" = "true" ] || cert_ok=false

          notary_api_ok=true
          [ "$HAS_APPLE_API_KEY" = "true" ] && [ "$HAS_APPLE_API_KEY_ID" = "true" ] && [ "$HAS_APPLE_API_ISSUER" = "true" ] || notary_api_ok=false

          notary_id_ok=true
          [ "$HAS_APPLE_ID" = "true" ] && [ "$HAS_APPLE_APP_SPECIFIC_PASSWORD" = "true" ] && [ "$HAS_APPLE_TEAM_ID" = "true" ] || notary_id_ok=false

          any_set=false
          for flag in "$HAS_MAC_CERTIFICATE_FILE" "$HAS_MAC_CERTIFICATE_PASSWORD" \
                      "$HAS_APPLE_API_KEY" "$HAS_APPLE_API_KEY_ID" "$HAS_APPLE_API_ISSUER" \
                      "$HAS_APPLE_ID" "$HAS_APPLE_APP_SPECIFIC_PASSWORD" "$HAS_APPLE_TEAM_ID"; do
            [ "$flag" = "true" ] && any_set=true
          done

          if [ "$cert_ok" = "true" ] && { [ "$notary_api_ok" = "true" ] || [ "$notary_id_ok" = "true" ]; }; then
            echo "mode=developer-id" >> "$GITHUB_OUTPUT"
            echo "Developer ID signing + notarization credentials detected; electron-builder will sign, notarize, and staple."
            exit 0
          fi

          if [ "$any_set" = "false" ] && [ "${REQUIRE_MAC_SIGNING:-}" != "1" ]; then
            echo "mode=adhoc" >> "$GITHUB_OUTPUT"
            echo "::warning::No Apple signing secrets configured — building an AD-HOC signed macOS app. Gatekeeper will warn on first launch and the in-app updater will use the unsigned swap path. Add the secrets listed in docs/operations/macos-signing.md to ship signed, notarized, auto-updating builds."
            exit 0
          fi

          # Either signing was required, or secrets are partially configured.
          # List every missing piece by exact secret name.
          echo "::error::macOS signing credentials are incomplete. Missing GitHub Actions secrets:"
          [ "$HAS_MAC_CERTIFICATE_FILE" = "true" ]     || echo "::error::  - MAC_CERTIFICATE_FILE (base64-encoded Developer ID Application certificate .p12)"
          [ "$HAS_MAC_CERTIFICATE_PASSWORD" = "true" ] || echo "::error::  - MAC_CERTIFICATE_PASSWORD (password for the .p12)"
          if [ "$notary_api_ok" = "false" ] && [ "$notary_id_ok" = "false" ]; then
            echo "::error::  - notarization credentials — add ONE full set:"
            echo "::error::    App Store Connect API key (preferred):"
            [ "$HAS_APPLE_API_KEY" = "true" ]    || echo "::error::      - APPLE_API_KEY (contents of the AuthKey_XXXXXXXXXX.p8 file, raw or base64)"
            [ "$HAS_APPLE_API_KEY_ID" = "true" ] || echo "::error::      - APPLE_API_KEY_ID (the key's 10-character ID)"
            [ "$HAS_APPLE_API_ISSUER" = "true" ] || echo "::error::      - APPLE_API_ISSUER (App Store Connect issuer UUID)"
            echo "::error::    or Apple ID fallback:"
            [ "$HAS_APPLE_ID" = "true" ]                    || echo "::error::      - APPLE_ID (Apple developer account email)"
            [ "$HAS_APPLE_APP_SPECIFIC_PASSWORD" = "true" ] || echo "::error::      - APPLE_APP_SPECIFIC_PASSWORD (app-specific password from appleid.apple.com)"
            [ "$HAS_APPLE_TEAM_ID" = "true" ]               || echo "::error::      - APPLE_TEAM_ID (10-character team ID)"
          fi
          echo "::error::One-time setup steps: docs/operations/macos-signing.md"
          exit 1

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Stamp version into package.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.meta.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar

      # notarytool wants the App Store Connect key as a file on disk, but a
      # GitHub secret can only hold the key's contents. Accept the raw .p8 PEM
      # or a base64-encoded copy and write it to a runner-local file.
      - name: Materialize App Store Connect API key
        id: notary
        if: steps.signing.outputs.mode == 'developer-id'
        shell: bash
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_KEY_CONTENT:-}" ]; then
            echo "api_key_path=" >> "$GITHUB_OUTPUT"
            echo "No APPLE_API_KEY secret; notarization will use the APPLE_ID credential set."
            exit 0
          fi
          KEY_PATH="$RUNNER_TEMP/apple-notary-api-key.p8"
          if printf '%s' "$APPLE_API_KEY_CONTENT" | grep -q 'BEGIN PRIVATE KEY'; then
            printf '%s\n' "$APPLE_API_KEY_CONTENT" > "$KEY_PATH"
          else
            printf '%s' "$APPLE_API_KEY_CONTENT" | base64 --decode > "$KEY_PATH"
            grep -q 'BEGIN PRIVATE KEY' "$KEY_PATH" || {
              echo "::error::APPLE_API_KEY secret is neither a raw .p8 PEM nor base64 of one."
              exit 1
            }
          fi
          chmod 600 "$KEY_PATH"
          echo "api_key_path=$KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Typecheck
        run: npm run typecheck

      - name: Build Vite bundles
        # Analytics/crash keys are compiled into the main bundle at build time;
        # without them every release ships with telemetry hard-disabled.
        env:
          POSTHOG_PROJECT_TOKEN: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          DAYLENS_BILLING_API_URL: ${{ secrets.DAYLENS_BILLING_API_URL }}
        run: npm run build:all

      - name: Package with electron-builder
        shell: bash
        env:
          SIGNING_MODE: ${{ steps.signing.outputs.mode }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_FILE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # notarytool needs a key FILE; the materialize step wrote the secret
          # to disk and exported its path.
          APPLE_API_KEY: ${{ steps.notary.outputs.api_key_path }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ "$SIGNING_MODE" = "adhoc" ]; then
            # The env block declares CSC_LINK / APPLE_* as empty strings when
            # the corresponding secrets are missing. electron-builder then
            # treats those empty strings as file paths and exits with
            # "<cwd> not a file". Unset every signing-related variable so
            # electron-builder takes the no-identity path and our afterSign
            # hook can re-sign the bundle ad-hoc.
            unset CSC_LINK CSC_KEY_PASSWORD
            unset APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER
            unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          else
            # Belt and braces: the electron-builder config re-validates the
            # credential set and fails the build instead of silently shipping
            # an unsigned or un-notarized release.
            export DAYLENS_REQUIRE_MAC_SIGNING=1
            # Drop any INCOMPLETE notarization credential set: a partial set
            # (or empty-string env entries) would make electron-builder's
            # notarytool step fail even though the other set is complete.
            if [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_ID:-}" ] || [ -z "${APPLE_API_ISSUER:-}" ]; then
              unset APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER
            fi
            if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
              unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD
            fi
            [ -n "${APPLE_TEAM_ID:-}" ] || unset APPLE_TEAM_ID
          fi
          npx electron-builder --mac zip dmg --publish never --config electron-builder.config.js

      # A signed release that fails Gatekeeper is worse than no release: users
      # download it and macOS refuses to open it. Verify the Developer ID
      # signature, the stapled notarization ticket, and Gatekeeper's own
      # assessment before anything is published.
      - name: Verify signature and notarization
        if: steps.signing.outputs.mode == 'developer-id'
        shell: bash
        run: |
          set -euo pipefail
          APP_BUNDLE="$(find dist-release -type d -name 'Daylens.app' -print -quit)"
          test -n "$APP_BUNDLE"
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE"
          /usr/bin/codesign -dv --verbose=2 "$APP_BUNDLE" 2>&1 | grep -v '^$' || true
          if /usr/bin/codesign -dv "$APP_BUNDLE" 2>&1 | grep -qi 'Signature=adhoc'; then
            echo "::error::Bundle is ad-hoc signed but the developer-id pipeline ran — signing regressed."
            exit 1
          fi
          xcrun stapler validate "$APP_BUNDLE"
          spctl --assess --type execute --verbose=2 "$APP_BUNDLE"

      - name: Verify packaged native module layout
        run: node scripts/verify-packaged-natives.js dist-release

      - name: Smoke-test packaged foreground and fullscreen capture
        shell: bash
        run: |
          APP_BUNDLE="$(find dist-release -type d -name Daylens.app -print -quit)"
          test -n "$APP_BUNDLE"
          export DAYLENS_SMOKE_TEST=1
          export DAYLENS_SMOKE_REPORT_PATH="$RUNNER_TEMP/daylens-macos-smoke.json"
          export DAYLENS_SMOKE_WINDOW_STATE_PATH="$RUNNER_TEMP/daylens-macos-window-state.json"
          export DAYLENS_SMOKE_EXPECT_FOREGROUND_TITLE="Runtime Capture Foreground"
          export DAYLENS_SMOKE_EXPECT_FULLSCREEN_TITLE="Runtime Capture Fullscreen"
          export DAYLENS_DEV_USERDATA="$RUNNER_TEMP/daylens-macos-userdata"
          scripts/run-macos-capture-smoke.sh "$APP_BUNDLE"
          node scripts/verify-macos-smoke.js \
            --report "$DAYLENS_SMOKE_REPORT_PATH" \
            --window-state "$DAYLENS_SMOKE_WINDOW_STATE_PATH"

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          RELEASE_TAG="${{ steps.meta.outputs.release_tag }}"
          CHANGELOG_SECTION=""
          if [ -f CHANGELOG.md ]; then
            CHANGELOG_SECTION="$(awk -v version="$VERSION" '
              $0 ~ "^## v" version " -" { flag = 1; next }
              /^## v/ && flag { exit }
              flag { print }
            ' CHANGELOG.md)"
          fi

          if [ -z "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION="- Preview release build for v$VERSION"
          fi

          PREV_TAG="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\\.[0-9]+\\.[0-9]+$' | grep -vx "$RELEASE_TAG" | head -n 1 || true)"
          if [ -n "$PREV_TAG" ]; then
            COMMIT_LINES="$(git log --pretty='- %h %s' --max-count=12 "${PREV_TAG}..${{ github.sha }}")"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.sha }}"
          else
            COMMIT_LINES="$(git log --pretty='- %h %s' --max-count=12 HEAD)"
            COMPARE_URL=""
          fi

          if [ -z "$COMMIT_LINES" ]; then
            COMMIT_LINES="- Initial macOS release build"
          fi

          {
            echo 'body<<EOF'
            echo "## Daylens $VERSION"
            echo
            echo "### Highlights"
            echo "$CHANGELOG_SECTION"
            echo
            echo "### Included commits"
            echo "$COMMIT_LINES"
            if [ -n "$COMPARE_URL" ]; then
              echo
              echo "Compare changes: $COMPARE_URL"
            fi
            echo
            echo "### Downloads"
            echo "- macOS installer: \`Daylens-${VERSION}-arm64.dmg\`"
            echo "- macOS archive: \`Daylens-${VERSION}-arm64.zip\`"
            echo "- macOS updater metadata: \`latest-mac.yml\`"
            echo
            echo "### Release assets"
            echo "This shared version release can be populated by the macOS, Windows, and Linux workflows."
            echo 'This macOS workflow uploads the DMG, ZIP, and `latest-mac.yml`.'
            echo 'Windows and Linux assets only appear on this release when their matching workflows run for the same version.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Daylens ${{ steps.meta.outputs.version }}
          tag_name: ${{ steps.meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.notes.outputs.body }}
          overwrite_files: true
          files: |
            dist-release/*.dmg
            dist-release/*.dmg.blockmap
            dist-release/*.zip
            dist-release/*.zip.blockmap
            dist-release/latest-mac.yml

      - name: Upload macOS diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: macos-release-diagnostics-${{ steps.meta.outputs.version }}
          if-no-files-found: warn
          compression-level: 0
          retention-days: 14
          path: |
            dist-release/**
            ${{ runner.temp }}/daylens-macos-smoke.json
            ${{ runner.temp }}/daylens-macos-window-state.json
            builder-debug.yml
            electron-builder-debug.yml
            npm-debug.log*
