name: Remote Parity

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      smoke_base_url:
        description: "Optional staging base URL for smoke tests"
        required: false
      smoke_session_cookie:
        description: "Optional session cookie for authenticated staging smoke tests"
        required: false

# Cancel superseded runs on PRs and feature branches; never cancel main pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Daylens monorepo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          # apps/web is an npm workspace member; the only lockfile is the root one.
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        # Workspace members have no own lockfile — install from the monorepo root.
        # --ignore-scripts skips the desktop app's Electron native rebuild (repo CI
        # convention); sharp is the one web dependency that needs its install script.
        run: |
          npm ci --ignore-scripts
          npm rebuild sharp

      - name: Generate Convex API types
        working-directory: apps/web
        run: |
          if [ -n "${CONVEX_DEPLOYMENT:-}" ]; then
            npm run convex:codegen
          else
            echo "Skipping Convex codegen; CONVEX_DEPLOYMENT is not available in this CI context."
          fi

      - name: Validate remote contract
        working-directory: apps/web
        run: npm run contract:check

      - name: Validate Convex manifest
        working-directory: apps/web
        run: npm run manifest:check

      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Staging smoke
        working-directory: apps/web
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_base_url != '' && inputs.smoke_session_cookie != '' }}
        env:
          SMOKE_BASE_URL: ${{ inputs.smoke_base_url }}
          SMOKE_SESSION_COOKIE: ${{ inputs.smoke_session_cookie }}
        run: npm run smoke:staging
