name: Release Windows

on:
  push:
    tags:
      - "v*-win"
  workflow_dispatch:
    inputs:
      version:
        description: Windows version number to release
        required: true
      tag_name:
        description: Git tag to publish against
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      WIN_CERTIFICATE_FILE: ${{ secrets.WIN_CERTIFICATE_FILE }}
      WIN_CERTIFICATE_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
      WIN_CERT_SUBJECT_NAME: ${{ secrets.WIN_CERT_SUBJECT_NAME }}

    steps:
      - name: Derive version from tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG_NAME="${{ inputs.tag_name }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            VERSION="${VERSION%-win}"
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Stamp version into package.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.meta.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar

      - name: Typecheck
        run: npm run typecheck

      - name: Build Vite bundles
        shell: bash
        run: |
          export STANDALONE_BUILD=1
          npx vite build --config vite.main.config.ts
          npx vite build --config vite.preload.config.ts
          npx vite build --config vite.renderer.config.ts

      - name: Decode code-signing certificate
        if: ${{ env.WIN_CERTIFICATE_FILE != '' }}
        shell: bash
        run: |
          echo "$WIN_CERTIFICATE_FILE" | base64 --decode > /tmp/cert.pfx
          echo "WIN_CERTIFICATE_FILE_PATH=/tmp/cert.pfx" >> "$GITHUB_ENV"
          echo "WIN_CERTIFICATE_PASSWORD=$WIN_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
          echo "WIN_CERT_SUBJECT_NAME=$WIN_CERT_SUBJECT_NAME" >> "$GITHUB_ENV"

      - name: Package with electron-builder
        run: npx electron-builder --win --publish always --config electron-builder.config.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Daylens ${{ steps.meta.outputs.version }} (Windows)
          tag_name: ${{ steps.meta.outputs.tag_name }}
          body: |
            ## Daylens ${{ steps.meta.outputs.version }} for Windows

            This release tightens the shell and cleans up the core tracking views so Daylens stays readable while you move between tabs and smaller window sizes.

            ### What's new in ${{ steps.meta.outputs.version }}
            - **Collapsible sidebar** - one-click icon-only mode, with the preference saved between launches
            - **Responsive layouts across tabs** - Focus, Today, History, Apps, Insights, and Settings reflow more cleanly at narrower widths
            - **Cleaner detail views** - removed low-value AI helper cards and simplified chart hover copy
            - **Sharper update banner** - update download and restart states read more clearly in-app
            - **Safer releases** - standard Windows CI now validates builds before shipping changes

            ### Install

            1. Download `Daylens-${{ steps.meta.outputs.version }}-Setup.exe` below
            2. Run the installer
            3. Launch Daylens from the Desktop shortcut or Start menu

            ### System requirements
            - Windows 10 or later (64-bit)
            - Internet connection only for AI features (Claude API key required for Insights)
          files: |
            dist-release/Daylens-${{ steps.meta.outputs.version }}-Setup.exe
