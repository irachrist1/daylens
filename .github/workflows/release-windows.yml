name: Release Windows

on:
  push:
    tags:
      - "v*-win"
  workflow_dispatch:
    inputs:
      version:
        description: Windows version number to release
        required: true
      tag_name:
        description: Git tag to publish against
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    timeout-minutes: 90
    runs-on: windows-latest
    env:
      WIN_CERTIFICATE_FILE: ${{ secrets.WIN_CERTIFICATE_FILE }}
      WIN_CERTIFICATE_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
      WIN_CERT_SUBJECT_NAME: ${{ secrets.WIN_CERT_SUBJECT_NAME }}

    steps:
      - name: Derive version from tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG_NAME="${{ inputs.tag_name }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            VERSION="${VERSION%-win}"
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          RELEASE_TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Stamp version into package.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.meta.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar

      - name: Typecheck
        run: npm run typecheck

      - name: Build Vite bundles
        # Analytics/crash keys are compiled into the main bundle at build time;
        # without them every release ships with telemetry hard-disabled.
        env:
          POSTHOG_PROJECT_TOKEN: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          DAYLENS_BILLING_API_URL: ${{ secrets.DAYLENS_BILLING_API_URL }}
        run: npm run build:all

      # ── Code signing (required) ───────────────────────────────────────────
      # Production Windows releases must be Authenticode-signed. The updater is
      # disabled for unsigned packaged builds, and this workflow fails before
      # packaging if the signing secrets are missing.
      #
      # Required secrets (set via gh secret set --repo irachrist1/daylens):
      #   WIN_CERTIFICATE_FILE      — base64-encoded PFX
      #   WIN_CERTIFICATE_PASSWORD  — PFX password
      #   WIN_CERT_SUBJECT_NAME     — exact Authenticode subject DN
      - name: Detect code-signing credentials
        id: signing
        shell: pwsh
        run: |
          $hasCert = (-not [string]::IsNullOrWhiteSpace($env:WIN_CERTIFICATE_FILE)) -and `
                     (-not [string]::IsNullOrWhiteSpace($env:WIN_CERTIFICATE_PASSWORD)) -and `
                     (-not [string]::IsNullOrWhiteSpace($env:WIN_CERT_SUBJECT_NAME))
          if ($hasCert) {
            Write-Host "Authenticode credentials found — installer will be signed."
            echo "enabled=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "No Authenticode credentials found. Windows release builds must be signed before they can ship or auto-update. Configure WIN_CERTIFICATE_FILE, WIN_CERTIFICATE_PASSWORD, and WIN_CERT_SUBJECT_NAME."
            exit 1
          }

      - name: Decode code-signing certificate
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'daylens-signing.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WIN_CERTIFICATE_FILE))
          if (-not (Test-Path $certPath)) {
            Write-Error "Decoded certificate is missing: $certPath"
            exit 1
          }

          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($certPath, $env:WIN_CERTIFICATE_PASSWORD)
          if ($cert.Subject -ne $env:WIN_CERT_SUBJECT_NAME) {
            Write-Error "WIN_CERT_SUBJECT_NAME must equal the PFX signer subject. Expected '$env:WIN_CERT_SUBJECT_NAME', got '$($cert.Subject)'."
            exit 1
          }

          echo "WIN_CERTIFICATE_FILE_PATH=$certPath" >> $env:GITHUB_ENV
          echo "WIN_CERTIFICATE_PASSWORD=$env:WIN_CERTIFICATE_PASSWORD" >> $env:GITHUB_ENV
          echo "WIN_CERT_SUBJECT_NAME=$env:WIN_CERT_SUBJECT_NAME" >> $env:GITHUB_ENV

      - name: Package with electron-builder
        env:
          DAYLENS_REQUIRE_WIN_SIGNING: "1"
        run: npx electron-builder --win --publish never --config electron-builder.config.js

      - name: Verify Authenticode signatures
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $expectedSubject = $env:WIN_CERT_SUBJECT_NAME
          $updateConfig = 'dist-release\win-unpacked\resources\app-update.yml'
          if (-not (Test-Path $updateConfig)) {
            Write-Error "Expected updater config is missing: $updateConfig"
            exit 1
          }
          $updateConfigContent = Get-Content -Raw -Path $updateConfig
          if ($updateConfigContent -notmatch [regex]::Escape($expectedSubject)) {
            Write-Error "Packaged updater metadata does not pin the expected publisher subject: $expectedSubject"
            exit 1
          }

          $requiredPaths = @(
            'dist-release\win-unpacked\Daylens.exe',
            'dist-release\Daylens-${{ steps.meta.outputs.version }}-Setup.exe'
          )

          foreach ($path in $requiredPaths) {
            if (-not (Test-Path $path)) {
              Write-Error "Expected signed file is missing: $path"
              exit 1
            }
          }

          $paths = @(Get-ChildItem -Path 'dist-release' -Recurse -Filter '*.exe' -File | Select-Object -ExpandProperty FullName)
          if ($paths.Count -eq 0) {
            Write-Error "No Windows executables found to verify."
            exit 1
          }

          foreach ($path in $paths) {
            $signature = Get-AuthenticodeSignature -FilePath $path
            if ($signature.Status -ne 'Valid') {
              Write-Error "$path is not Authenticode-signed with a valid trusted signature. Status: $($signature.Status). Message: $($signature.StatusMessage)"
              exit 1
            }
            if ($signature.SignerCertificate.Subject -ne $expectedSubject) {
              Write-Error "$path was signed by '$($signature.SignerCertificate.Subject)', expected '$expectedSubject'."
              exit 1
            }
            Write-Host "$path signed by $($signature.SignerCertificate.Subject)"
          }

      - name: Verify packaged native module layout
        run: node scripts/verify-packaged-natives.js dist-release

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          RELEASE_TAG="${{ steps.meta.outputs.release_tag }}"
          CHANGELOG_SECTION=""
          if [ -f CHANGELOG.md ]; then
            CHANGELOG_SECTION="$(awk -v version="$VERSION" '
              $0 ~ "^## v" version " -" { flag = 1; next }
              /^## v/ && flag { exit }
              flag { print }
            ' CHANGELOG.md)"
          fi

          if [ -z "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION="- Preview release build for v$VERSION"
          fi

          PREV_TAG="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\\.[0-9]+\\.[0-9]+$' | grep -vx "$RELEASE_TAG" | head -n 1 || true)"
          if [ -n "$PREV_TAG" ]; then
            COMMIT_LINES="$(git log --pretty='- %h %s' --max-count=12 "${PREV_TAG}..${{ github.sha }}")"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.sha }}"
          else
            COMMIT_LINES="$(git log --pretty='- %h %s' --max-count=12 HEAD)"
            COMPARE_URL=""
          fi

          if [ -z "$COMMIT_LINES" ]; then
            COMMIT_LINES="- Initial Windows release build"
          fi

          {
            echo 'body<<EOF'
            echo "## Daylens $VERSION"
            echo
            echo "### Highlights"
            echo "$CHANGELOG_SECTION"
            echo
            echo "### Included commits"
            echo "$COMMIT_LINES"
            if [ -n "$COMPARE_URL" ]; then
              echo
              echo "Compare changes: $COMPARE_URL"
            fi
            echo
            echo "### Downloads"
            echo "- Windows installer: \`Daylens-${VERSION}-Setup.exe\`"
            echo "- Windows updater metadata: \`latest.yml\`"
            echo
            echo "### Release assets"
            echo "This shared version release can be populated by the macOS, Windows, and Linux workflows."
            echo 'This Windows workflow uploads `Daylens-${VERSION}-Setup.exe`, `Daylens-${VERSION}-Setup.exe.blockmap`, and `latest.yml`.'
            echo 'macOS and Linux assets only appear on this release when their matching workflows run for the same version.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Daylens ${{ steps.meta.outputs.version }}
          tag_name: ${{ steps.meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.notes.outputs.body }}
          overwrite_files: true
          files: |
            dist-release/Daylens-${{ steps.meta.outputs.version }}-Setup.exe
            dist-release/Daylens-${{ steps.meta.outputs.version }}-Setup.exe.blockmap
            dist-release/latest.yml

      - name: Upload Windows diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: windows-release-diagnostics-${{ steps.meta.outputs.version }}
          if-no-files-found: warn
          compression-level: 0
          retention-days: 14
          path: |
            dist-release/**
            builder-debug.yml
            electron-builder-debug.yml
            npm-debug.log*
