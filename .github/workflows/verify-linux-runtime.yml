name: Verify Linux Runtime

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  verify-linux-runtime:
    timeout-minutes: 120
    # GitHub-hosted Ubuntu keeps runtime validation available even when external runners queue.
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging and runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libsecret-1-dev libnotify-dev libx11-dev libxss-dev libxtst-dev xvfb xauth x11-utils xdotool dbus-x11 chromium-browser openbox xterm
          docker --version

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar

      - name: Typecheck
        run: npm run typecheck

      - name: Build Vite bundles
        run: npm run build:all

      - name: Package Linux artifacts
        run: npx electron-builder --linux AppImage deb rpm --x64 --config electron-builder.config.js --publish never

      - name: Sanity-check emitted artifacts
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test -f "dist-release/Daylens-${VERSION}.AppImage"
          test -f "dist-release/Daylens-${VERSION}.deb"
          test -f "dist-release/Daylens-${VERSION}.rpm"
          test -f "dist-release/latest-linux.yml"
          test "$(stat -c%s "dist-release/Daylens-${VERSION}.AppImage")" -gt 1000000
          test "$(stat -c%s "dist-release/Daylens-${VERSION}.deb")" -gt 1000000
          test "$(stat -c%s "dist-release/Daylens-${VERSION}.rpm")" -gt 1000000

          dpkg-deb --info "dist-release/Daylens-${VERSION}.deb" | tee "$RUNNER_TEMP/daylens-deb-info.txt"
          grep -Eq '^ Package:' "$RUNNER_TEMP/daylens-deb-info.txt"
          grep -Eq "^ Version:[[:space:]]*${VERSION}$" "$RUNNER_TEMP/daylens-deb-info.txt"

          rpm -qip "dist-release/Daylens-${VERSION}.rpm" | tee "$RUNNER_TEMP/daylens-rpm-info.txt"
          grep -Eq '^Name[[:space:]]*:' "$RUNNER_TEMP/daylens-rpm-info.txt"
          grep -Eq "^Version[[:space:]]*:[[:space:]]*${VERSION}$" "$RUNNER_TEMP/daylens-rpm-info.txt"

      - name: Smoke-test AppImage runtime
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          chmod +x "dist-release/Daylens-${VERSION}.AppImage"
          timeout 110s dbus-run-session -- xvfb-run -a env \
            DAYLENS_SMOKE_TEST=1 \
            DAYLENS_SMOKE_REPORT_PATH="$RUNNER_TEMP/daylens-appimage-smoke.json" \
            DAYLENS_SMOKE_WINDOW_STATE_PATH="$RUNNER_TEMP/daylens-appimage-window-state.json" \
            DAYLENS_SMOKE_EXPECT_FOREGROUND_TITLE="Runtime Capture Foreground" \
            DAYLENS_SMOKE_EXPECT_FULLSCREEN_TITLE="Runtime Capture Fullscreen" \
            DAYLENS_DEV_USERDATA="$RUNNER_TEMP/daylens-appimage-userdata" \
            APPIMAGE_EXTRACT_AND_RUN=1 \
            scripts/run-linux-capture-smoke.sh "./dist-release/Daylens-${VERSION}.AppImage" \
            --no-sandbox \
            --disable-setuid-sandbox
          node scripts/verify-linux-smoke.js \
            --report "$RUNNER_TEMP/daylens-appimage-smoke.json" \
            --window-state "$RUNNER_TEMP/daylens-appimage-window-state.json" \
            --expect-package-type appimage \
            --expect-package-source appimage-env \
            --expect-updater-supported true

      - name: Smoke-test DEB install
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_FILE="dist-release/Daylens-${VERSION}.deb"
          PACKAGE_NAME="$(dpkg-deb -f "$PACKAGE_FILE" Package)"
          sudo dpkg -i "$PACKAGE_FILE" || sudo apt-get install -f -y
          APP_PATH="$(dpkg -L "$PACKAGE_NAME" | while IFS= read -r candidate; do
            if [ -f "$candidate" ] && [ -x "$candidate" ] && [ "$(basename "$candidate")" = "daylens" ]; then
              printf '%s\n' "$candidate"
              break
            fi
          done)"
          test -n "$APP_PATH"
          timeout 110s dbus-run-session -- xvfb-run -a env \
            DAYLENS_SMOKE_TEST=1 \
            DAYLENS_SMOKE_REPORT_PATH="$RUNNER_TEMP/daylens-deb-smoke.json" \
            DAYLENS_SMOKE_WINDOW_STATE_PATH="$RUNNER_TEMP/daylens-deb-window-state.json" \
            DAYLENS_SMOKE_EXPECT_FOREGROUND_TITLE="Runtime Capture Foreground" \
            DAYLENS_SMOKE_EXPECT_FULLSCREEN_TITLE="Runtime Capture Fullscreen" \
            DAYLENS_DEV_USERDATA="$RUNNER_TEMP/daylens-deb-userdata" \
            scripts/run-linux-capture-smoke.sh "$APP_PATH" \
            --no-sandbox \
            --disable-setuid-sandbox
          node scripts/verify-linux-smoke.js \
            --report "$RUNNER_TEMP/daylens-deb-smoke.json" \
            --window-state "$RUNNER_TEMP/daylens-deb-window-state.json" \
            --expect-package-type deb \
            --expect-package-source dpkg-query \
            --expect-updater-supported true \
            --require-package-owner
          sudo apt-get remove -y "$PACKAGE_NAME" || true

      - name: Smoke-test RPM install
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          docker run --rm \
            -v "$PWD:/workspace" \
            -v "$RUNNER_TEMP:/smoke" \
            -w /workspace \
            fedora:40 \
            bash -lc '
              set -euo pipefail
              dnf install -y nodejs npm findutils grep sed xorg-x11-server-Xvfb xdotool xprop xterm openbox xorg-x11-apps dbus-daemon gtk3 libnotify libXScrnSaver libXtst nss libsecret xdg-utils
              PACKAGE_FILE="dist-release/Daylens-'"${VERSION}"'.rpm"
              dnf install --nogpgcheck -y "$PACKAGE_FILE"
              PACKAGE_NAME="$(rpm -qp --queryformat "%{NAME}" "$PACKAGE_FILE")"
              APP_PATH="$(rpm -ql "$PACKAGE_NAME" | while IFS= read -r candidate; do
                if [ -f "$candidate" ] && [ -x "$candidate" ] && [ "$(basename "$candidate")" = "daylens" ]; then
                  printf "%s\n" "$candidate"
                  break
                fi
              done)"
              test -n "$APP_PATH"
              Xvfb :99 -screen 0 1280x720x24 >/tmp/daylens-xvfb.log 2>&1 &
              XVFB_PID=$!
              trap "kill $XVFB_PID" EXIT
              export DISPLAY=:99
              export DAYLENS_SMOKE_TEST=1
              export DAYLENS_SMOKE_REPORT_PATH=/smoke/daylens-rpm-smoke.json
              export DAYLENS_SMOKE_WINDOW_STATE_PATH=/smoke/daylens-rpm-window-state.json
              export DAYLENS_SMOKE_EXPECT_FOREGROUND_TITLE="Runtime Capture Foreground"
              export DAYLENS_SMOKE_EXPECT_FULLSCREEN_TITLE="Runtime Capture Fullscreen"
              export DAYLENS_DEV_USERDATA=/tmp/daylens-rpm-userdata
              timeout 110s dbus-run-session -- scripts/run-linux-capture-smoke.sh "$APP_PATH" \
                --no-sandbox \
                --disable-setuid-sandbox
              node scripts/verify-linux-smoke.js \
                --report /smoke/daylens-rpm-smoke.json \
                --window-state /smoke/daylens-rpm-window-state.json \
                --expect-package-type rpm \
                --expect-package-source rpm-query \
                --expect-updater-supported true \
                --require-package-owner
            '

      - name: Upload Linux runtime diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: linux-runtime-diagnostics
          if-no-files-found: warn
          compression-level: 0
          retention-days: 14
          path: |
            dist-release/**
            ${{ runner.temp }}/daylens-appimage-smoke.json
            ${{ runner.temp }}/daylens-deb-smoke.json
            ${{ runner.temp }}/daylens-rpm-smoke.json
            ${{ runner.temp }}/daylens-appimage-window-state.json
            ${{ runner.temp }}/daylens-deb-window-state.json
            ${{ runner.temp }}/daylens-rpm-window-state.json
            ${{ runner.temp }}/daylens-deb-info.txt
            ${{ runner.temp }}/daylens-rpm-info.txt
            builder-debug.yml
            electron-builder-debug.yml
            npm-debug.log*
