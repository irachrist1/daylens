name: Verify macOS Runtime

on:
  push:
    branches:
      - main
  pull_request:
    # Full packaging + smoke is expensive; on PRs only run when
    # packaging-relevant inputs change. Pushes to main and manual
    # dispatches always run unconditionally.
    paths:
      - "electron-builder.config.js"
      - "forge.config.ts"
      - "build/**"
      - "scripts/**"
      - "src/main/**"
      - "src/native/**"
      - "vite.*.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/verify-macos-runtime.yml"
  workflow_dispatch:

# Cancel superseded runs on PRs and feature branches; never cancel main pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify-macos-runtime:
    timeout-minutes: 90
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Cache Electron binary download
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Cache native module builds
        id: native-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.electron-gyp
            node_modules/better-sqlite3/build/Release
            node_modules/keytar/build/Release
            node_modules/@paymoapp/active-window/build/Release
          key: native-build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Rebuild native modules for Electron
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar

      # Typecheck is platform-independent and runs once in ci.yml.

      - name: Build Vite bundles and capture helper
        run: npm run build:all

      - name: Package macOS application
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac dir --publish never --config electron-builder.config.js

      - name: Verify packaged native modules
        run: node scripts/verify-packaged-natives.js dist-release

      - name: Smoke-test packaged foreground and fullscreen capture
        shell: bash
        run: |
          APP_BUNDLE="$(find dist-release -type d -name Daylens.app -print -quit)"
          test -n "$APP_BUNDLE"
          export DAYLENS_SMOKE_TEST=1
          export DAYLENS_SMOKE_REPORT_PATH="$RUNNER_TEMP/daylens-macos-smoke.json"
          export DAYLENS_SMOKE_WINDOW_STATE_PATH="$RUNNER_TEMP/daylens-macos-window-state.json"
          export DAYLENS_SMOKE_EXPECT_FOREGROUND_TITLE="Runtime Capture Foreground"
          export DAYLENS_SMOKE_EXPECT_FULLSCREEN_TITLE="Runtime Capture Fullscreen"
          export DAYLENS_DEV_USERDATA="$RUNNER_TEMP/daylens-macos-userdata"
          scripts/run-macos-capture-smoke.sh "$APP_BUNDLE"
          node scripts/verify-macos-smoke.js \
            --report "$DAYLENS_SMOKE_REPORT_PATH" \
            --window-state "$DAYLENS_SMOKE_WINDOW_STATE_PATH"

      - name: Upload macOS runtime diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: macos-runtime-diagnostics
          if-no-files-found: warn
          compression-level: 0
          retention-days: 14
          path: |
            dist-release/**
            ${{ runner.temp }}/daylens-macos-smoke.json
            ${{ runner.temp }}/daylens-macos-window-state.json
            builder-debug.yml
            electron-builder-debug.yml
            npm-debug.log*
