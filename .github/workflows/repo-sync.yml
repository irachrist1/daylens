name: Repository Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-main:
    if: ${{ github.repository == 'irachrist1/daylens' || github.repository == 'Andersen-in-Rwanda/daylens' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target repository
        id: target
        run: |
          set -euo pipefail
          case "${GITHUB_REPOSITORY}" in
            irachrist1/daylens)
              echo "repo=Andersen-in-Rwanda/daylens" >> "${GITHUB_OUTPUT}"
              ;;
            Andersen-in-Rwanda/daylens)
              echo "repo=irachrist1/daylens" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "Repository ${GITHUB_REPOSITORY} is not in sync-pair allowlist." >&2
              exit 1
              ;;
          esac

      - name: Mirror main to paired repository
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
          SYNC_REPO_TOKEN: ${{ secrets.SYNC_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SYNC_REPO_TOKEN:-}" ]; then
            echo "Missing required secret: SYNC_REPO_TOKEN" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add sync "https://x-access-token:${SYNC_REPO_TOKEN}@github.com/${TARGET_REPO}.git"

          target_head="$(git ls-remote sync refs/heads/main | awk '{print $1}')"
          if [ "${target_head}" = "${GITHUB_SHA}" ]; then
            echo "Paired repository already at ${GITHUB_SHA}; no push needed."
            exit 0
          fi

          git push sync "HEAD:refs/heads/main"
