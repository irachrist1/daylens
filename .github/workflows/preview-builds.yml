name: Preview Builds

on:
  push:
    tags-ignore:
      - "v*-win"
      - "v*-mac"
      - "v*-linux"
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs for the same ref (e.g. repeated dispatches on a
# branch); never cancel main pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-preview:
    name: Preview ${{ matrix.platform }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # GitHub-hosted macOS keeps preview validation available even when external runners queue.
          - os: macos-latest
            platform: mac
            artifact_name: daylens-preview-macos
            artifact_paths: |
              dist-release/*.dmg
              dist-release/*.zip
          # Windows stays on GitHub-hosted runners — Blacksmith Windows is in public beta and the
          # NSIS signing toolchain is sensitive to runner environment changes.
          - os: windows-latest
            platform: win
            artifact_name: daylens-preview-windows
            artifact_paths: |
              dist-release/*.exe
              dist-release/*.blockmap
              dist-release/latest*.yml
          # GitHub-hosted Ubuntu keeps preview validation available even when external runners queue.
          - os: ubuntu-24.04
            platform: linux
            artifact_name: daylens-preview-linux
            artifact_paths: |
              dist-release/*.AppImage
              dist-release/*.deb
              dist-release/*.rpm
              dist-release/*.tar.gz
              dist-release/latest-linux.yml

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libsecret-1-dev libnotify-dev libx11-dev libxss-dev libxtst-dev xvfb xauth x11-utils xdotool dbus-x11

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Cache Electron binary download (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Cache Electron binary download (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Cache Electron binary download (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Cache native module builds
        id: native-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.electron-gyp
            node_modules/better-sqlite3/build/Release
            node_modules/keytar/build/Release
            node_modules/@paymoapp/active-window/build/Release
          key: native-build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Rebuild native modules for Electron
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar

      # Typecheck is platform-independent and runs once in ci.yml.

      - name: Build Vite bundles
        # Analytics/crash keys are compiled into the main bundle at build time;
        # without them every release ships with telemetry hard-disabled.
        env:
          POSTHOG_PROJECT_TOKEN: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: npm run build:all

      - name: Package preview build
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            npx electron-builder --mac zip dmg --publish never --config electron-builder.config.js
          elif [ "${{ matrix.platform }}" = "linux" ]; then
            npx electron-builder --linux AppImage deb rpm tar.gz --x64 --publish never --config electron-builder.config.js
          else
            npx electron-builder --win nsis --publish never --config electron-builder.config.js
          fi

      - name: Verify packaged native module layout
        run: node scripts/verify-packaged-natives.js dist-release

      - name: Verify preview update metadata
        if: matrix.platform == 'win' || matrix.platform == 'linux'
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            test -f dist-release/latest.yml
          else
            test -f dist-release/latest-linux.yml
          fi
          ls -l dist-release/latest*.yml

      - name: Upload preview artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Upload preview diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}-diagnostics
          if-no-files-found: warn
          compression-level: 0
          retention-days: 14
          path: |
            dist-release/**
            builder-debug.yml
            electron-builder-debug.yml
            npm-debug.log*
